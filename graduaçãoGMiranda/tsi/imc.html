<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width = device-width, initial-scale=1.0">
    <title>Gabriel de Miranda</title>
</head>

<body>
    <button onclick="calculo()">Calcular</button>
    <h1>Cálcular o IMC com base no peso e altura de um indivíduo</h1>
    <script>
        function calculo() {
            var p = Number(prompt("Diga seu peso em quilos"));
            var a = Number(prompt("Diga sua altura em metros (utilize ponto final para vírgula)"))
            var imc = p / a ** 2;
            var arredondado = Math.round(imc);
            alert("O IMC de alguém com " + p + " quilos e " + a + " é de " + arredondado);
        }

    </script>
</body>

</html>
