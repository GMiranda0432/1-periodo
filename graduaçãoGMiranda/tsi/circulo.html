<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width = device-width, initial-scale=1.0">
    <title>Fórmulas do cículo</title>
</head>

<body>
    <h1> Calcular circuferência, diâmetro e área do círculo</h1>
    <script>
        var r = Number(prompt("Diga o raio do seu círculo"));
        var dig = Number(prompt("Diga até quantos dígitos irá valer o pi, (1-9)"))
        if (dig == 1) {
            var p = 3;
        }
        if (dig == 2) {
            var p = 3.1
        }
        if (dig == 3) {
            var p = 3.14
        }
        if (dig == 4) {
            var p = 3.141
        }
        if (dig == 5) {
            var p = 3.1415
        }
        if (dig == 6) {
            var p = 3.14159
        }
        if (dig == 7) {
            var p = 3.141592
        }
        if (dig == 8) {
            var p = 3.1415926
        }
        if (dig == 9) {
            var p = 3.14159265
        }
        var c = r * p * 2;
        var a = r ** 2 * p;
        var d = r * 2;
        alert("Considerando o valor de Pi como: " + p + ", a circunferência é: " + c + ", a área é: " + a + ", e o diâmetro é: " + d);
    </script>

</body>

</html>
