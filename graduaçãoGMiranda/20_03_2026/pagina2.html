<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprar ingressos e assentos</title>
</head>

<body>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #141414;
            color: #ffffff;
        }


        h1 {
            background-color: #000000;
            color: #e50914;
            padding: 20px;
            margin: 0;
            text-align: center;
        }

        h2 {
            color: #e50914;
            margin-left: 20px;
        }

        h3 {
            margin-left: 20px;
        }

        p {
            margin: 15px 20px;
            line-height: 1.6;
        }

        ul {
            list-style: none;
            display: flex;
            gap: 15px;
            padding: 10px 20px;
            background-color: #000000;
        }

        li a {
            text-decoration: none;
            color: #ffffff;
            font-weight: 600;
            transition: 0.3s;
        }

        li a:hover {
            color: #e50914;
        }

        a {
            color: #e50914;
        }

        a:hover {
            text-decoration: underline;
        }

        p strong {
            color: #e50914;
        }

        body>*:not(h1):not(ul) {
            max-width: 900px;
            margin: auto;
        }

        .editable:empty:before {
            content: "Edite este texto: ";
            font-weight: bold;
            color: #808080;
        }
    </style>
    <h1>Comprar ingressos e assentos</h1>

    </ul>
</body>

</html>
