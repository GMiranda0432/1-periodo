<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso contato Cinemark</title>
</head>

<body>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #141414;
            color: #ffffff;
        }


        h1 {
            background-color: #000000;
            color: #e50914;
            padding: 20px;
            margin: 0;
            text-align: center;
        }

        h2 {
            color: #e50914;
            margin-left: 20px;
        }

        h3 {
            margin-left: 20px;
        }

        p {
            margin: 15px 20px;
            line-height: 1.6;
        }

        ul {
            list-style: none;
            display: flex;
            gap: 15px;
            padding: 10px 20px;
            background-color: #000000;
        }

        li a {
            text-decoration: none;
            color: #ffffff;
            font-weight: 600;
            transition: 0.3s;
        }

        li a:hover {
            color: #e50914;
        }

        a {
            color: #e50914;
        }

        a:hover {
            text-decoration: underline;
        }

        p strong {
            color: #e50914;
        }

        body>*:not(h1):not(ul) {
            max-width: 900px;
            margin: auto;
        }

        .editable:empty:before {
            content: "Edite este texto: ";
            font-weight: bold;
            color: #808080;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 20px;
        }
        label {
            font-weight: 600;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        button {
            width: 100px;
            padding: 10px;
            background-color: #e50914;
            color: #ffffff;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }
    </style>
    <h1>Peça ajuda utilizando o formulário abaixo...</h1>
    <form action="#" method="post">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="mensagem">Mensagem:</label>
        <textarea id="mensagem" name="mensagem" required></textarea>

        <button type="submit">Enviar</button>
    </form>
    <h1>...ou entre em contato pelas vias abaixo</h1>
    <p><strong>email:</strong> cinemarkoficial@gmail.com</p>
    <p><strong>telefone:</strong> (11) 4002-8922</p>
    <p><strong>endereço:</strong> Rua dos bobos, 0 - Serra, ES</p>
    <h3>Navegação</h3>
    <ul>
        <li><a href="index.html">Início</a></li>
        <li><a href="pagina2.html">Conteúdo</a></li>
        <li><a href="contato.html">Contato</a></li>
    </ul>
</body>

</html>
