<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
</head>

<body>
    <div class="container">
        <h1>Calculadora</h1>
        <label for="operando1">Operando 1:</label>
        <input type="number" id="operando1" step="any" />

        <label for="operando2">Operando 2:</label>
        <input type="number" id="operando2" step="any" />

        <label for="operacao">Operação:</label>
        <select id="operacao">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">*</option>
            <option value="/">/</option>
            <option value="^">^</option>
            <option value="SQRT">SQRT</option>
        </select>
        
        <div class="buttons">
            <button type="button" id="calcular">=</button>
            <button type="button" id="limpar">Limpar</button>
        </div>

        <p id="output"></p>
    </div>

    <script src="calculadora.js"></script>
</body>

</html>
