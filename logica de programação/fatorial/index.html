<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fibonacci</title>
    <h1>Sequência de Fibonacci</h1>
</head>
<body>
    <form id="fibonacci-form">
        <label for="n">Digite um número:</label>
        <input type="number" id="n" name="n" required>
        <button type="submit">Calcular</button>
    </form>
    <div id="resultado"></div>
    <script>
        document.getElementById("fibonacci-form").addEventListener("submit", function(event) {
            event.preventDefault();
            const n = parseInt(document.getElementById("n").value);
            let a = 0, b = 1, resultado = "";
            for (let i = 0; i < n; i++) {
                resultado += a + " ";
                let temp = a;
                a = b;
                b = temp + b;
            }
            document.getElementById("resultado").innerText = "Fibonacci: " + resultado;
        });
    </script>
</body>
</html>
