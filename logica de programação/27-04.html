<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>

    <input type="button" value="Jogar Par/Ímpar" id="btJogar">
  </p>
  <h3 id="outNumeroGerado"></h3>
  <h3 id="outResultadoJogo"></h3>
  <h3 id="outPontuação"></h3>

  <script src="27-04.js"></script>

  <div id="outAtualizarPontuacao"></div>
