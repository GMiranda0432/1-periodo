<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisar posição no Quadrante</title>
</head>

<body> 
    <h1>Plano cartesiano</h1>
    <h3> diga os valores de x e y e então, aperte o botão de <strong>ver quadrante</strong> para saber o resultado</h3>
    <form>
        <label for="x">Valor de  X:</label>
        <input type="number" id="x" name="x">
        <br>
        <label for="y">Valor de Y:</label>
        <input type="number" id="y" name="y">
        <br>
        <button type="submit">Ver quadrante</button>
        <br>
</form>
    <div id="quadrante"></div>
    <script src="planoCartesiano.js"></script>
</body>

</html>
